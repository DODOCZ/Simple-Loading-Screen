<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --c:    #00ffe0;
    --c2:   #0af0b0;
    --bg:   #04100d;
    --bdr:  rgba(0,255,200,.18);
    --bdrB: rgba(0,255,200,.45);
    --txt:  #d4f5ec;
    --dim:  rgba(180,240,220,.5);
    --mono: 'Share Tech Mono', monospace;
    --head: 'Exo 2', sans-serif;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%;height:100%;background:#000;overflow:hidden;font-family:var(--head);color:var(--txt);user-select:none; }

/* scanlines */
body::after { content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999; }

/* ── FULLSCREEN BG ── */
#bgSlides { position:fixed;inset:0;z-index:0; }
.bg-slide { position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s ease; }
.bg-slide.active { opacity:1; }
.bg-slide video { position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block; }

#bgOverlay {
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:
        linear-gradient(to bottom,
            rgba(4,16,13,.75) 0%,
            rgba(4,16,13,.15) 22%,
            rgba(4,16,13,.15) 58%,
            rgba(4,16,13,.88) 80%,
            rgba(4,16,13,.98) 100%
        ),
        radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(0,0,0,.5) 100%);
}

/* done */
.done-overlay { position:fixed;inset:0;z-index:8000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s; }
.done-overlay.show { opacity:1; }
.done-pulse { font-family:var(--mono);font-size:14px;letter-spacing:8px;color:var(--c);text-shadow:0 0 20px var(--c);animation:blink 1s ease-in-out infinite; }
@keyframes blink    { 0%,100%{opacity:1}50%{opacity:.15} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulseDot { 0%,100%{opacity:1}50%{opacity:.2} }
@keyframes shimmer  { from{left:-80px} to{left:110%} }
@keyframes ledPulse { 0%,100%{box-shadow:0 0 6px var(--c)}50%{box-shadow:0 0 18px var(--c),0 0 32px rgba(0,255,200,.3)} }

/* ── SCREEN ── */
#screen { position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column; }

/* ── TOP BAR ── */
#topBar { display:flex;align-items:flex-start;justify-content:space-between;padding:18px 24px 0;flex-shrink:0;animation:fadeUp .5s ease both; }

.srv-id { display:flex;align-items:center;gap:14px; }
.srv-icon-wrap {
    width:48px;height:48px;flex-shrink:0;
    border:2px solid var(--bdrB);
    background:rgba(0,255,200,.06);
    display:flex;align-items:center;justify-content:center;
    position:relative;
}
.srv-icon-wrap::before { content:'';position:absolute;inset:-5px;border:1px solid rgba(0,255,200,.12);pointer-events:none;animation:ledPulse 2.5s ease-in-out infinite; }
.srv-icon-wrap i { font-size:22px;color:var(--c);text-shadow:0 0 12px var(--c); }
.srv-name { font-size:26px;font-weight:900;letter-spacing:3px;color:#fff;line-height:1.1; }
.srv-ip   { font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:1.5px;margin-top:3px; }

/* logo box — image only, no border when logo loaded */
.logo-wrap {
    flex-shrink:0;
    width:130px; height:80px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
}
.logo-wrap img {
    max-width:130px; max-height:80px;
    object-fit:contain;
    filter:drop-shadow(0 0 12px rgba(0,200,255,.35));
    display:block;
}
/* placeholder shown when no logo configured */
.logo-placeholder {
    border:2px dashed rgba(0,255,200,.35);
    width:100%; height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);
    background:rgba(0,255,200,.03);
}
.logo-placeholder i { font-size:18px;color:rgba(0,255,200,.3); }

/* ── SPACER ── */
#centerSpacer { flex:1; }

/* ── LOADING ── */
#loadingSection { flex-shrink:0;padding:0 24px 10px;display:flex;flex-direction:column;align-items:center;gap:10px;animation:fadeUp .5s .1s ease both; }
.load-label { font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:6px;color:#fff;text-shadow:0 0 20px rgba(0,255,200,.5);display:flex;align-items:center;gap:14px; }
.load-pct   { color:var(--c); }
.load-dots  { color:rgba(0,255,200,.6);letter-spacing:3px; }
.prog-wrap  { width:100%;max-width:680px; }
.prog-track { height:8px;width:100%;background:rgba(0,255,200,.08);border:1px solid rgba(0,255,200,.18);border-radius:4px;overflow:hidden;position:relative; }
.prog-fill  { height:100%;width:0%;background:linear-gradient(90deg,#00cc99,var(--c),#00ffcc);border-radius:4px;box-shadow:0 0 12px rgba(0,255,200,.6),0 0 24px rgba(0,255,200,.3);transition:width .4s ease;position:relative;overflow:hidden; }
.prog-shine { position:absolute;top:0;left:-80px;width:80px;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);animation:shimmer 2s linear infinite; }

/* ── TIP ── */
#tipRow { flex-shrink:0;padding:8px 24px 10px;display:flex;align-items:center;gap:10px;font-size:13px;color:rgba(200,240,228,.78);animation:fadeUp .5s .15s ease both; }
#tipRow i { color:var(--c);font-size:14px;flex-shrink:0; }
#tipRow strong { color:var(--c);font-weight:700;margin-right:4px; }
#tipText { transition:opacity .35s; }
#tipText.fade { opacity:0; }

/* ── INFO BAR ── */
#infoBar {
    flex-shrink:0;display:flex;align-items:center;
    height:42px;
    border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);
    background:rgba(4,16,13,.78);padding:0 6px;
    animation:fadeUp .5s .2s ease both;overflow:hidden;
}
.ib-item { display:flex;align-items:center;gap:7px;padding:0 16px;border-right:1px solid rgba(0,255,200,.1);font-family:var(--mono);font-size:9.5px;color:var(--dim);letter-spacing:1px;white-space:nowrap;height:100%; }
.ib-item:last-child { border-right:none;margin-left:auto; }
.ib-item i { color:var(--c);font-size:11px; }
.ib-val { color:var(--txt);font-weight:700;font-size:10.5px; }
.ib-live { display:flex;align-items:center;gap:5px; }
.ib-dot  { width:6px;height:6px;border-radius:50%;background:var(--c);box-shadow:0 0 8px var(--c);animation:pulseDot 2s ease-in-out infinite; }

/* ── MUSIC BAR ── */
#musicBar { flex-shrink:0;display:flex;align-items:center;gap:0;height:68px;background:rgba(2,10,8,.92);border-top:1px solid rgba(0,255,200,.1);animation:fadeUp .5s .25s ease both; }
.mb-thumb { width:100px;height:68px;flex-shrink:0;background:rgba(0,255,200,.04);border-right:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative; }
.mb-thumb-bg { position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.45) saturate(1.4); }
.mb-thumb i { position:relative;z-index:1;font-size:20px;color:rgba(0,255,200,.5); }
.mb-info { flex:1;padding:0 18px;min-width:0; }
.mb-label { font-family:var(--mono);font-size:7.5px;color:var(--dim);letter-spacing:2px;margin-bottom:4px; }
.mb-track { font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.mb-controls { display:flex;align-items:center;gap:8px;padding:0 16px;flex-shrink:0; }
.mb-btn { width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,255,200,.2);background:rgba(0,255,200,.05);color:var(--c);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s; }
.mb-btn:hover { background:rgba(0,255,200,.15);border-color:var(--c);box-shadow:0 0 10px rgba(0,255,200,.2); }
.mb-btn.big { width:36px;height:36px;font-size:14px;background:rgba(0,255,200,.08);border-color:rgba(0,255,200,.35); }
.mb-vol-wrap { display:flex;align-items:center;gap:8px;padding:0 16px;flex-shrink:0; }
.mb-vol-wrap i { font-size:11px;color:var(--dim); }
.mb-vol { width:80px;-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:rgba(0,255,200,.15);outline:none;cursor:pointer; }
.mb-vol::-webkit-slider-thumb { -webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--c);box-shadow:0 0 6px rgba(0,255,200,.6);cursor:pointer; }
.mb-vol-lbl { font-family:var(--mono);font-size:8px;color:var(--dim);min-width:26px; }
.mb-meta { display:flex;flex-direction:column;align-items:flex-end;padding:0 18px;flex-shrink:0;gap:4px;font-family:var(--mono);font-size:8px;color:var(--dim); }
.mb-meta-row { display:flex;align-items:center;gap:6px; }
.mb-meta-row i { color:var(--c);font-size:9px; }

/* ── SLIDE DOTS & ARROWS ── */
#ssDots { position:fixed;bottom:130px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:7px;pointer-events:none; }
.ss-dot { width:6px;height:6px;border-radius:50%;background:rgba(0,255,200,.2);border:1px solid rgba(0,255,200,.3);transition:all .3s;pointer-events:all;cursor:pointer; }
.ss-dot.on { background:var(--c);box-shadow:0 0 8px rgba(0,255,200,.6);transform:scale(1.3); }
.ss-arr { position:fixed;top:50%;transform:translateY(-50%);z-index:10;width:34px;height:34px;border-radius:50%;background:rgba(4,16,13,.7);border:1px solid rgba(0,255,200,.2);color:var(--c);font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:all .2s; }
body:hover .ss-arr { opacity:1; }
.ss-arr:hover { background:rgba(0,255,200,.12);border-color:var(--c); }
.ss-arr.left{left:14px} .ss-arr.right{right:14px}
</style>
</head>
<body>

<div id="bgSlides"></div>
<div id="bgOverlay"></div>
<div id="ssDots"></div>
<button class="ss-arr left"  id="ssLeft"><i class="fas fa-chevron-left"></i></button>
<button class="ss-arr right" id="ssRight"><i class="fas fa-chevron-right"></i></button>
<div class="done-overlay" id="doneOverlay"><div class="done-pulse">CONNECTED</div></div>
<audio id="bgMusic" loop preload="auto"></audio>

<div id="screen">

  <!-- TOP -->
  <div id="topBar">
    <div class="srv-id">
      <div class="srv-icon-wrap"><i class="fas fa-shield-halved"></i></div>
      <div>
        <div class="srv-name" id="srvName">YOUR SERVER NAME</div>
        <div class="srv-ip"   id="srvIp">Server IP: connect.yourserver.cz</div>
      </div>
    </div>
    <!-- Logo top-right -->
    <div class="logo-wrap" id="logoWrap">
      <!-- filled by JS — either <img> or placeholder -->
    </div>
  </div>

  <div id="centerSpacer"></div>

  <!-- LOADING -->
  <div id="loadingSection">
    <div class="load-label">
      <span class="load-dots">LOADING</span>
      <span class="load-dots" id="loadDots">....</span>
      <span class="load-pct" id="loadPct">0%</span>
    </div>
    <div class="prog-wrap">
      <div class="prog-track">
        <div class="prog-fill" id="progFill"><div class="prog-shine"></div></div>
      </div>
    </div>
  </div>

  <!-- TIP -->
  <div id="tipRow">
    <i class="fas fa-wifi"></i>
    <div><strong>TIP:</strong> <span id="tipText">Loading...</span></div>
  </div>

  <!-- INFO BAR — no players count, no heart, no version -->
  <div id="infoBar">
    <div class="ib-item">
      <i class="fas fa-server"></i>
      <span id="ibServerInfo">Server info</span>
    </div>
    <div class="ib-item">
      <i class="fas fa-flag"></i>
      <span class="ib-val" id="ibMode">ROLEPLAY</span>
    </div>
    <div class="ib-item">
      <i class="fab fa-discord"></i>
      <span id="ibDiscord" style="cursor:pointer" onclick="openLink(CONFIG.discordUrl)">discord.gg/...</span>
    </div>
    <div class="ib-item">
      <i class="fas fa-globe"></i>
      <span id="ibWebsite" style="cursor:pointer" onclick="openLink(CONFIG.websiteUrl)">yourwebsite.com</span>
    </div>
    <div class="ib-item ib-live">
      <div class="ib-dot"></div>
      <span class="ib-val" id="ibClock">00:00</span>
    </div>
  </div>

  <!-- MUSIC BAR -->
  <div id="musicBar">
    <div class="mb-thumb">
      <div class="mb-thumb-bg" id="mbThumb"></div>
      <i class="fas fa-music"></i>
    </div>
    <div class="mb-info">
      <div class="mb-label">NOW PLAYING</div>
      <div class="mb-track" id="mbTrack">—</div>
    </div>
    <div class="mb-controls">
      <button class="mb-btn" id="mbPrev"><i class="fas fa-backward-step"></i></button>
      <button class="mb-btn big" id="mbPlay"><i class="fas fa-play" id="mbPlayIco"></i></button>
      <button class="mb-btn" id="mbNext"><i class="fas fa-forward-step"></i></button>
      <button class="mb-btn" id="mbMute"><i class="fas fa-volume-low" id="mbMuteIco"></i></button>
    </div>
    <div class="mb-vol-wrap">
      <i class="fas fa-volume-low"></i>
      <input type="range" class="mb-vol" id="mbVol" min="0" max="100" value="5">
      <span class="mb-vol-lbl" id="mbVolLbl">5%</span>
    </div>
    <div class="mb-meta">
      <div class="mb-meta-row"><i class="fas fa-calendar"></i><span id="mbDate">—</span></div>
      <div class="mb-meta-row"><i class="fas fa-clock"></i><span id="mbTime">—</span></div>
    </div>
  </div>

</div>

<script src="config.js"></script>
<script>
'use strict';
const $ = id => document.getElementById(id);

function openLink(url) {
    if (typeof invokeNative !== 'undefined') invokeNative('openUrl', url);
    else window.open(url, '_blank');
}

/* ── Apply CONFIG ── */
function applyConfig() {
    $('srvName').textContent    = CONFIG.serverName   || 'YOUR SERVER NAME';
    $('srvIp').textContent      = 'Server IP: ' + (CONFIG.serverIp || 'connect.yourserver.cz');
    $('ibServerInfo').textContent = CONFIG.serverName || 'Server info';
    $('ibMode').textContent     = CONFIG.gameMode     || 'ROLEPLAY';
    $('ibDiscord').textContent  = (CONFIG.discordUrl  || '').replace('https://','');
    $('ibWebsite').textContent  = (CONFIG.websiteUrl  || '').replace('https://','');

    // Logo top-right
    const wrap = $('logoWrap');
    if (CONFIG.logoFile) {
        const img = document.createElement('img');
        img.src = CONFIG.logoFile;
        img.alt = CONFIG.serverName || '';
        wrap.appendChild(img);
    } else {
        wrap.innerHTML = '<div class="logo-placeholder"><i class="fas fa-image"></i><span>YOUR LOGO<br>HERE</span></div>';
    }

    // Music volume
    const au = $('bgMusic');
    au.volume = CONFIG.musicVolume || 0.05;
    $('mbVol').value    = Math.round((CONFIG.musicVolume || 0.05) * 100);
    $('mbVolLbl').textContent = Math.round((CONFIG.musicVolume || 0.05) * 100) + '%';
}

/* ── Clock ── */
function tickClock() {
    const n = new Date();
    $('ibClock').textContent = [n.getHours(),n.getMinutes()].map(v=>String(v).padStart(2,'0')).join(':');
    $('mbTime').textContent  = [n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');
    $('mbDate').textContent  = n.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
setInterval(tickClock, 1000); tickClock();

/* ── Dots animation ── */
let dotsN = 0;
setInterval(() => { dotsN=(dotsN+1)%5; $('loadDots').textContent='.'.repeat(dotsN+1); }, 400);

/* ── Gallery ── */
let galIdx=0, galTimer=null;
function buildGallery() {
    const wrap=$('bgSlides'), dots=$('ssDots');
    if (!wrap||!CONFIG.gallery.length) return;
    wrap.innerHTML=''; dots.innerHTML='';

    CONFIG.gallery.forEach((p,i) => {
        const s=document.createElement('div');
        s.className='bg-slide'+(i===0?' active':'');

        if (p.type==='video') {
            // VIDEO: autoplay muted attributes in HTML — required for FiveM CEF
            s.innerHTML='<video autoplay muted playsinline loop style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;">'
                        +'<source src="'+p.src+'" type="video/mp4"></video>';
        } else {
            s.style.backgroundImage="url('"+p.src+"')";
            // use first image as music bar thumbnail
            if (i===0) $('mbThumb').style.backgroundImage="url('"+p.src+"')";
        }
        wrap.appendChild(s);

        const d=document.createElement('div'); d.className='ss-dot'+(i===0?' on':'');
        (function(idx){d.onclick=()=>galTo(idx);})(i);
        dots.appendChild(d);
    });

    $('ssLeft').onclick  = ()=>galTo((galIdx-1+CONFIG.gallery.length)%CONFIG.gallery.length);
    $('ssRight').onclick = ()=>galTo((galIdx+1)%CONFIG.gallery.length);
    galStartAuto();
}
function galTo(idx) {
    const sl=document.querySelectorAll('.bg-slide'), dt=document.querySelectorAll('.ss-dot');
    if(sl[galIdx]) sl[galIdx].classList.remove('active');
    if(dt[galIdx]) dt[galIdx].classList.remove('on');
    galIdx=((idx%CONFIG.gallery.length)+CONFIG.gallery.length)%CONFIG.gallery.length;
    if(sl[galIdx]) sl[galIdx].classList.add('active');
    if(dt[galIdx]) dt[galIdx].classList.add('on');
    galStartAuto();
}
function galStartAuto() {
    if(galTimer) clearInterval(galTimer);
    const cur=CONFIG.gallery[galIdx];
    if(cur&&cur.type==='video') return;
    if(CONFIG.gallery.length<=1) return;
    galTimer=setInterval(()=>galTo((galIdx+1)%CONFIG.gallery.length),CONFIG.galleryInterval||6000);
}

/* ── Tips ── */
let tipIdx=0;
function applyTip() {
    const el=$('tipText'); if(!el) return;
    el.classList.add('fade');
    setTimeout(()=>{ el.textContent=CONFIG.tips[tipIdx%CONFIG.tips.length]; el.classList.remove('fade'); },350);
}
setInterval(()=>{ tipIdx=(tipIdx+1)%CONFIG.tips.length; applyTip(); },CONFIG.tipInterval||6000);

/* ── Music ── */
let musicIdx=0, musicPlaying=false;
function initMusic() {
    const au=$('bgMusic');
    if(!CONFIG.musicFiles||!CONFIG.musicFiles.length) return;
    au.src=CONFIG.musicFiles[0]; updateTrackLabel();
    au.addEventListener('ended',()=>musicGoTo(musicIdx+1));

    function tryPlay(){ au.play().then(()=>{ musicPlaying=true; syncBtn(true); }).catch(()=>{}); }

    $('mbPlay').onclick=()=>{ if(!musicPlaying){tryPlay();}else if(au.paused){au.play();syncBtn(true);}else{au.pause();syncBtn(false);} };
    $('mbPrev').onclick=()=>musicGoTo(musicIdx-1);
    $('mbNext').onclick=()=>musicGoTo(musicIdx+1);
    $('mbMute').onclick=()=>{ au.muted=!au.muted; $('mbMuteIco').className=au.muted?'fas fa-volume-xmark':'fas fa-volume-low'; };
    $('mbVol').oninput=()=>{ const v=parseInt($('mbVol').value)/100; au.volume=v; au.muted=false; $('mbVolLbl').textContent=$('mbVol').value+'%'; $('mbMuteIco').className='fas fa-volume-low'; if(!musicPlaying&&v>0)tryPlay(); };
    document.addEventListener('click',  tryPlay,{once:true});
    document.addEventListener('keydown',tryPlay,{once:true});
    tryPlay();
}
function musicGoTo(idx) {
    const au=$('bgMusic');
    musicIdx=((idx%CONFIG.musicFiles.length)+CONFIG.musicFiles.length)%CONFIG.musicFiles.length;
    au.src=CONFIG.musicFiles[musicIdx]; au.load(); updateTrackLabel();
    if(musicPlaying) au.play().catch(()=>{});
}
function updateTrackLabel() {
    const el=$('mbTrack'); if(!el) return;
    el.textContent=CONFIG.musicFiles[musicIdx].split('/').pop().replace(/\.[^.]+$/,'');
}
function syncBtn(p){ const ico=$('mbPlayIco'); if(ico) ico.className=p?'fas fa-pause':'fas fa-play'; }

/* ── Progress ── */
let pct=0,stepIdx=0,done=false,realProg=false;
function animPct(from,to,dur) {
    dur=dur||350; const t0=performance.now();
    (function tick(now){
        const t=Math.min((now-t0)/dur,1),cur=Math.round(from+(to-from)*t);
        $('progFill').style.width=cur+'%';
        $('loadPct').textContent=cur+'%';
        pct=cur; if(t<1) requestAnimationFrame(tick);
    })(performance.now());
}
function finish() {
    if(done) return; done=true;
    animPct(pct,100,500);
    setTimeout(()=>{ const ov=$('doneOverlay'); ov.classList.add('show'); setTimeout(()=>ov.classList.remove('show'),1500); },520);
}
function nextStep() {
    if(done||realProg) return;
    if(stepIdx>=(CONFIG.steps||[]).length){finish();return;}
    animPct(pct,Math.round(((stepIdx+1)/CONFIG.steps.length)*95));
    stepIdx++;
    setTimeout(nextStep,500+Math.random()*600);
}

/* ── NUI ── */
window.addEventListener('message',function(e){
    if(!e.data) return;
    if(e.data.eventName==='loadProgress'){ realProg=true; animPct(pct,Math.max(0,Math.min(100,Math.round((e.data.loadFraction||0)*100)))); return; }
    if(e.data.eventName==='onLogLine') return;
    if(!e.data.type) return;
    if(e.data.type==='loadingDone') finish();
});

/* ── Boot ── */
applyConfig();
buildGallery();
initMusic();
applyTip();
setTimeout(nextStep,600);
</script>
</body>
</html>
